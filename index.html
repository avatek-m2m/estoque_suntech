<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque SIM Cards | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: 700; }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Fix para tabelas longas */
        .table-container { max-height: calc(100vh - 250px); overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-slate-900 shadow-lg p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">📦</div>
                <h1 class="text-xl font-bold text-white tracking-tight">Controle de SIM Cards</h1>
            </div>
            <div class="relative w-full md:w-1/3">
                <input type="text" id="search" placeholder="Buscar por ICCID, Cliente, IMEI..." 
                    class="w-full pl-10 pr-4 py-2 rounded-full border-none focus:ring-2 focus:ring-blue-500 outline-none text-sm shadow-inner">
                <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-6">
        <div id="tabs" class="flex overflow-x-auto no-scrollbar gap-2 mb-4 bg-white p-2 rounded-xl shadow-sm border border-gray-200">
            </div>

        <div id="loading" class="flex flex-col items-center justify-center py-24">
            <div class="loader ease-linear rounded-full border-4 border-gray-200 h-14 w-14 mb-4"></div>
            <p class="text-gray-500 font-medium animate-pulse">Sincronizando com Google Sheets...</p>
        </div>

        <div id="table-wrapper" class="hidden bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-200">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <span id="tab-title" class="text-lg font-bold text-gray-700 uppercase tracking-widest text-sm">Aba Selecionada</span>
                <span id="row-count" class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full">0 registros</span>
            </div>
            
            <div class="table-container">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead id="table-head" class="bg-gray-50 sticky top-0">
                        </thead>
                    <tbody id="table-body" class="bg-white divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
            
            <div id="no-results" class="hidden p-16 text-center">
                <div class="text-5xl mb-4">🏜️</div>
                <p class="text-gray-400 font-medium">Nenhum dado encontrado para essa busca.</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzNbm0Xf4GU4MxYhGznyI-so_uMlXSCmc7ieS1GMte-yZvclg_h3FNJk7hAPI5KyBECAw/exec';
        let dadosGlobais = {};
        let abaAtual = 'Estoque';

        async function init() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error();
                dadosGlobais = await response.json();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('table-wrapper').classList.remove('hidden');
                
                renderizarAbas();
                selecionarAba('Estoque');
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="text-red-500 text-center">
                        <p class="font-bold text-xl">⚠️ Erro na Conexão</p>
                        <p class="text-sm mt-2">Verifique se o Apps Script está publicado corretamente para "Qualquer pessoa".</p>
                    </div>`;
            }
        }

        function renderizarAbas() {
            const container = document.getElementById('tabs');
            Object.keys(dadosGlobais).forEach(nome => {
                const btn = document.createElement('button');
                btn.innerText = nome;
                btn.id = `btn-${nome}`;
                btn.className = "px-6 py-2 text-sm font-medium text-gray-500 hover:text-blue-600 transition-all duration-200 whitespace-nowrap rounded-lg hover:bg-blue-50";
                btn.onclick = () => selecionarAba(nome);
                container.appendChild(btn);
            });
        }

        function selecionarAba(nome) {
            abaAtual = nome;
            document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active-tab', 'bg-blue-50'));
            document.getElementById(`btn-${nome}`).classList.add('active-tab', 'bg-blue-50');
            document.getElementById('tab-title').innerText = nome;
            renderizarTabela();
        }

        function renderizarTabela(filtro = '') {
            const dados = dadosGlobais[abaAtual] || [];
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            const rowCount = document.getElementById('row-count');
            
            const filtrados = dados.filter(item => 
                Object.values(item).some(v => String(v).toLowerCase().includes(filtro.toLowerCase()))
            );

            head.innerHTML = '';
            body.innerHTML = '';
            rowCount.innerText = `${filtrados.length} registros`;

            if (filtrados.length > 0) {
                document.getElementById('no-results').classList.add('hidden');
                
                // Header
                const trH = document.createElement('tr');
                Object.keys(dados[0]).forEach(key => {
                    const th = document.createElement('th');
                    th.className = "px-6 py-3 text-left text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100";
                    th.innerText = key;
                    trH.appendChild(th);
                });
                head.appendChild(trH);

                // Body
                filtrados.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50/50 transition-colors";
                    Object.values(item).forEach(val => {
                        const td = document.createElement('td');
                        td.className = "px-6 py-4 text-sm text-gray-600 border-b border-gray-50 max-w-xs truncate";
                        td.innerText = val || '-';
                        tr.appendChild(td);
                    });
                    body.appendChild(tr);
                });
            } else {
                document.getElementById('no-results').classList.remove('hidden');
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            renderizarTabela(e.target.value);
        });

        init();
    </script>
</body>
</html>

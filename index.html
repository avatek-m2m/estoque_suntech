<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Estoque SIM Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen pb-10">

    <nav class="sticky top-0 z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    </div>
                    <span class="text-lg font-bold block leading-none">Estoque<span class="text-blue-600">Pro</span></span>
                </div>
                <div class="relative w-1/3">
                    <input type="text" id="busca" placeholder="Filtrar dados..." 
                        class="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm col-span-1 md:col-span-1">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Geral</p>
                <h3 id="card-total" class="text-3xl font-black text-slate-800 mt-1">--</h3>
                <p id="card-data" class="text-[10px] text-slate-400 mt-2 font-medium uppercase tracking-tighter">Sincronizando...</p>
            </div>

            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm col-span-1 md:col-span-1 flex flex-col items-center justify-center">
                <canvas id="chartPie" style="max-height: 120px;"></canvas>
                <p class="text-[10px] font-bold text-slate-400 uppercase mt-2">Market Share</p>
            </div>

            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm col-span-1 md:col-span-2">
                <canvas id="chartBar" style="max-height: 120px;"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-3xl border border-slate-200 shadow-xl overflow-hidden">
            <div id="loading" class="py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-slate-500 font-medium animate-pulse">Consultando Planilha...</p>
            </div>

            <div id="tabela-container" class="hidden custom-scrollbar overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr id="cabecalho" class="bg-slate-50/80 border-b border-slate-100 text-slate-400 text-[10px] uppercase font-bold tracking-widest">
                            </tr>
                    </thead>
                    <tbody id="corpo-tabela" class="divide-y divide-slate-50 text-sm text-slate-600">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzbAVOPYHCYXlmuEN-47XhAJU0p18GrPTPL3bQKJpIK0JUKuoi49jP4CytOBoQYezIKgg/exec';
        let dadosOriginais = [];
        let chartPie, chartBar;

        async function obterDados() {
            try {
                const res = await fetch(API_URL);
                dadosOriginais = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('tabela-container').classList.remove('hidden');
                
                renderizar(dadosOriginais);
                atualizarDashboard(dadosOriginais);
            } catch (err) {
                document.getElementById('loading').innerHTML = `<p class="text-red-500 p-10 font-bold italic">⚠️ Erro ao carregar dados.</p>`;
            }
        }

        function atualizarDashboard(dados) {
            const total = dados.reduce((acc, curr) => acc + (Number(curr.QUANTIDADE) || 0), 0);
            document.getElementById('card-total').innerText = total.toLocaleString();
            document.getElementById('card-data').innerText = `Atualizado em: ${dados[0]['DATA ATUALIZAÇÃO'] || '--'}`;

            // Preparar dados para os gráficos
            const operadoras = [...new Set(dados.map(d => d.OPERADORA))];
            const quantidades = operadoras.map(op => {
                return dados.filter(d => d.OPERADORA === op).reduce((acc, curr) => acc + (Number(curr.QUANTIDADE) || 0), 0);
            });

            renderCharts(operadoras, quantidades);
        }

        function renderCharts(labels, data) {
            const ctxPie = document.getElementById('chartPie').getContext('2d');
            const ctxBar = document.getElementById('chartBar').getContext('2d');

            if(chartPie) chartPie.destroy();
            if(chartBar) chartBar.destroy();

            const colors = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'];

            chartPie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { display: false } }, cutout: '70%' }
            });

            chartBar = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Qtd por Operadora',
                        data: data,
                        backgroundColor: '#3b82f6',
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y',
                    scales: { x: { display: false }, y: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderizar(dados) {
            const head = document.getElementById('cabecalho');
            const body = document.getElementById('corpo-tabela');
            head.innerHTML = '';
            body.innerHTML = '';

            if (dados.length > 0) {
                Object.keys(dados[0]).forEach(col => {
                    const th = document.createElement('th');
                    th.className = "px-8 py-4 font-bold uppercase";
                    th.innerText = col;
                    head.appendChild(th);
                });

                dados.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";
                    
                    Object.entries(item).forEach(([key, val]) => {
                        const td = document.createElement('td');
                        td.className = "px-8 py-4 whitespace-nowrap";
                        
                        const valUpper = String(val).toUpperCase();

                        if(key.toLowerCase() === 'operadora') {
                            let badge = '';
                            if (valUpper.includes('EMNIFY VERDE')) {
                                badge = `<span class="text-[10px] text-emerald-600 font-bold block mt-1">● Single IMSI Claro</span>`;
                            } else if (valUpper.includes('EMNIFY AZUL')) {
                                badge = `<span class="text-[10px] text-blue-500 font-bold block mt-1">● Multi IMSI Claro, Vivo e Tim</span>`;
                            }
                            td.innerHTML = `<span class="font-bold text-slate-800">${val}</span>${badge}`;
                        } else if(key.toLowerCase() === 'quantidade') {
                            td.innerHTML = `<span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg font-bold border border-blue-100">${val}</span>`;
                        } else {
                            td.innerText = val || '-';
                        }
                        tr.appendChild(td);
                    });
                    body.appendChild(tr);
                });
            }
        }

        document.getElementById('busca').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = dadosOriginais.filter(obj => 
                Object.values(obj).some(v => String(v).toLowerCase().includes(termo))
            );
            renderizar(filtrados);
        });

        obterDados();
    </script>
</body>
</html>

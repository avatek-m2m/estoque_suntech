<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Estoque SIM Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <nav class="sticky top-0 z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    </div>
                    <div>
                        <span class="text-lg font-bold block leading-none">Controle SIM</span>
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold">Inventory System</span>
                    </div>
                </div>
                <div class="relative w-1/3">
                    <input type="text" id="busca" placeholder="Filtrar por operadora ou data..." 
                        class="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                    <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total de Chips</p>
                <h3 id="card-total" class="text-4xl font-black text-slate-800 mt-2">--</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Última Sincronização</p>
                <div class="flex items-center gap-2 mt-2">
                    <span class="flex h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                    <h3 id="card-data" class="text-lg font-bold text-slate-700">--</h3>
                </div>
            </div>
            <div class="bg-blue-600 p-6 rounded-2xl shadow-lg shadow-blue-100 flex items-center justify-between overflow-hidden relative">
                <div class="z-10 text-white">
                    <p class="text-xs font-bold opacity-80 uppercase tracking-wider text-blue-100">Status da Base</p>
                    <h3 class="text-xl font-bold mt-1">Conectada</h3>
                </div>
                <svg class="w-20 h-20 absolute -right-4 -bottom-4 text-blue-500 opacity-30" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
            </div>
        </div>

        <div class="bg-white rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/50 overflow-hidden">
            <div id="loading" class="py-32 text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-[3px] border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-slate-500 font-semibold animate-pulse tracking-wide">Acessando Planilha...</p>
            </div>

            <div id="tabela-container" class="hidden custom-scrollbar overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr id="cabecalho" class="bg-slate-50/80 border-b border-slate-100 text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em]">
                            </tr>
                    </thead>
                    <tbody id="corpo-tabela" class="divide-y divide-slate-50 text-sm text-slate-600 font-medium">
                        </tbody>
                </table>
            </div>
            <div id="no-results" class="hidden py-20 text-center text-slate-400 font-medium">
                Nenhum dado encontrado para sua pesquisa.
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzbAVOPYHCYXlmuEN-47XhAJU0p18GrPTPL3bQKJpIK0JUKuoi49jP4CytOBoQYezIKgg/exec';
        let dadosOriginais = [];

        async function obterDados() {
            try {
                const res = await fetch(API_URL);
                dadosOriginais = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('tabela-container').classList.remove('hidden');
                
                renderizar(dadosOriginais);
                atualizarResumo(dadosOriginais);
            } catch (err) {
                document.getElementById('loading').innerHTML = `
                    <div class="text-red-500">
                        <p class="text-4xl mb-2">⚠️</p>
                        <p class="font-bold">Erro de conexão com o Google Sheets.</p>
                        <p class="text-xs opacity-70">Verifique se a implantação está para "Qualquer pessoa".</p>
                    </div>`;
            }
        }

        function atualizarResumo(dados) {
            const total = dados.reduce((acc, curr) => acc + (Number(curr.QUANTIDADE) || 0), 0);
            document.getElementById('card-total').innerText = total.toLocaleString();
            
            if(dados.length > 0) {
                const data = dados[0]['DATA ATUALIZAÇÃO'] || 'N/A';
                document.getElementById('card-data').innerText = data;
            }
        }

        function renderizar(dados) {
            const head = document.getElementById('cabecalho');
            const body = document.getElementById('corpo-tabela');
            const noResults = document.getElementById('no-results');
            
            head.innerHTML = '';
            body.innerHTML = '';

            if (dados.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            // Gerar Cabeçalho
            Object.keys(dados[0]).forEach(col => {
                const th = document.createElement('th');
                th.className = "px-8 py-5";
                th.innerText = col;
                head.appendChild(th);
            });

            // Gerar Linhas
            dados.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition-all duration-200 group";
                
                Object.entries(item).forEach(([key, val]) => {
                    const td = document.createElement('td');
                    td.className = "px-8 py-4 whitespace-nowrap";
                    
                    const valUpper = String(val).toUpperCase();

                    // CUSTOMIZAÇÃO DA OPERADORA
                    if(key.toLowerCase() === 'operadora') {
                        let badge = '';
                        if (valUpper.includes('EMNIFY VERDE')) {
                            badge = `<span class="flex items-center gap-1.5 text-[10px] text-emerald-600 font-bold mt-1 leading-none italic"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Single IMSI Claro</span>`;
                        } else if (valUpper.includes('EMNIFY AZUL')) {
                            badge = `<span class="flex items-center gap-1.5 text-[10px] text-blue-500 font-bold mt-1 leading-none italic"><span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Multi IMSI Claro, Vivo e Tim</span>`;
                        }
                        
                        td.innerHTML = `
                            <div class="flex flex-col">
                                <span class="text-slate-900 font-bold text-sm tracking-tight">${val}</span>
                                ${badge}
                            </div>
                        `;
                    } 
                    // CUSTOMIZAÇÃO DA QUANTIDADE
                    else if(key.toLowerCase() === 'quantidade') {
                        td.innerHTML = `<span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg font-bold border border-blue-100">${val}</span>`;
                    } 
                    else {
                        td.innerText = val || '-';
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        // Sistema de busca
        document.getElementById('busca').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = dadosOriginais.filter(obj => 
                Object.values(obj).some(v => String(v).toLowerCase().includes(termo))
            );
            renderizar(filtrados);
        });

        obterDados();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque Simplificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="bg-blue-700 text-white shadow-md p-6">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold">Estoque Geral</h1>
            <input type="text" id="busca" placeholder="Filtrar operadora ou data..." 
                class="w-full md:w-80 p-2 rounded-lg text-gray-800 outline-none focus:ring-4 focus:ring-blue-300 transition">
        </div>
    </header>

    <main class="flex-grow p-4 md:p-8">
        <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
            <div id="loading" class="p-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-gray-500">Buscando dados atualizados...</p>
            </div>

            <div id="tabela-container" class="hidden overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-100 border-b-2 border-gray-200">
                        <tr id="cabecalho"></tr>
                    </thead>
                    <tbody id="corpo-tabela" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzbAVOPYHCYXlmuEN-47XhAJU0p18GrPTPL3bQKJpIK0JUKuoi49jP4CytOBoQYezIKgg/exec';
        let dadosOriginais = [];

        async function obterDados() {
            try {
                const res = await fetch(API_URL);
                dadosOriginais = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('tabela-container').classList.remove('hidden');
                
                renderizar(dadosOriginais);
            } catch (err) {
                document.getElementById('loading').innerHTML = `<p class="text-red-500">Erro ao carregar. Verifique a permissão do Script.</p>`;
            }
        }

        function renderizar(dados) {
            const head = document.getElementById('cabecalho');
            const body = document.getElementById('corpo-tabela');
            
            head.innerHTML = '';
            body.innerHTML = '';

            if (dados.length > 0) {
                // Criar colunas
                Object.keys(dados[0]).forEach(col => {
                    const th = document.createElement('th');
                    th.className = "p-4 font-bold text-gray-700 uppercase text-xs";
                    th.innerText = col;
                    head.appendChild(th);
                });

                // Criar linhas
                dados.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50 transition";
                    Object.values(item).forEach(val => {
                        const td = document.createElement('td');
                        td.className = "p-4 text-sm text-gray-600";
                        td.innerText = val;
                        tr.appendChild(td);
                    });
                    body.appendChild(tr);
                });
            }
        }

        document.getElementById('busca').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = dadosOriginais.filter(obj => 
                Object.values(obj).some(v => String(v).toLowerCase().includes(termo))
            );
            renderizar(filtrados);
        });

        obterDados();
    </script>
</body>
</html>
